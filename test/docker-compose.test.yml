version: '3.8'
services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      - LLM_MOCK=true
      - MASSIVE_API_KEY=
    ports:
      - "8000:8000"
    volumes:
      - test-data:/app/db

  playwright:
    image: mcr.microsoft.com/playwright:v1.44.0-jammy
    working_dir: /app
    volumes:
      - ./e2e:/app
      - /app/node_modules
    environment:
      - BASE_URL=http://app:8000
    depends_on:
      - app
    command: npx playwright test

volumes:
  test-data:
